name: Validate Gradle Wrapper

on:
  push:
    paths: ["gradle/wrapper/**"]
  pull_request:
    paths: ["gradle/wrapper/**"]

permissions:
  contents: read

jobs:
  validation:
    name: "Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/wrapper-validation@v6
